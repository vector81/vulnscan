version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vulnscan
      POSTGRES_PASSWORD: vulnscan_secret
      POSTGRES_DB: vulnscan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - /tmp/vulnscan:/tmp/vulnscan

  worker:
    build: ./backend
    command: python -m app.worker
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - /tmp/vulnscan:/tmp/vulnscan
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  pgdata:
